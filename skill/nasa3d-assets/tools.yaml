tools:
  - name: search_nasa3d_assets
    description: Search downloadable 3D files in the NASA 3D Resources repository.
    source_file: scripts/search_nasa3d_assets.py
    execution: sync
    affinity: any
    timeout_hint_secs: 30
    enforce_thread_affinity: true
    annotations:
      read_only_hint: true
      idempotent_hint: true
      open_world_hint: true
    group: nasa3d
    input_schema:
      type: object
      properties:
        query:
          type: string
        limit:
          type: integer
          minimum: 1
          maximum: 50
          default: 10
        extensions:
          type: array
          items:
            type: string
          default: ["glb", "gltf", "obj", "fbx", "stl", "blend"]
    output_schema:
      type: object

  - name: download_nasa3d_file
    description: Download one file from the NASA 3D Resources repository.
    source_file: scripts/download_nasa3d_file.py
    execution: sync
    affinity: any
    timeout_hint_secs: 180
    enforce_thread_affinity: true
    annotations:
      read_only_hint: false
      destructive_hint: false
      idempotent_hint: false
      open_world_hint: true
    group: nasa3d
    input_schema:
      type: object
      required: ["path", "output_dir"]
      properties:
        path:
          type: string
        output_dir:
          type: string
    output_schema:
      type: object

